{% extends "base.html" %}
{% block title %}Dashboard — Acesso{% endblock %}
{% block badge %}Gestão{% endblock %}

{% block extra_css %}
<style>
  .login-wrap {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .login-card {
    background: var(--gc-white);
    border: 1px solid var(--gc-gray-100);
    border-radius: var(--radius);
    padding: 40px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .login-card h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .login-card p {
    font-size: 13px;
    color: var(--gc-gray-500);
    margin-bottom: 24px;
  }
  .login-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--gc-gray-300);
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--gc-green); }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <h1>Dashboard de Gestão</h1>
    <p>Insira o token de acesso para visualizar os resultados.</p>
    <form method="GET" action="/dashboard">
      <input type="password" name="token" class="login-input" placeholder="Token de acesso" autofocus required>
      <button type="submit" class="btn btn-primary">Acessar</button>
    </form>
  </div>
</div>
{% endblock %}
