<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Feedback Equipe{% endblock %} | Gran Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gc-white:      #FFFFFF;
      --gc-black:      #1A1A1A;
      --gc-green:      #3DAA35;
      --gc-green-dark: #2E8A27;
      --gc-green-pale: #E8F6E7;
      --gc-gray-900:   #1A1A1A;
      --gc-gray-700:   #444444;
      --gc-gray-500:   #777777;
      --gc-gray-300:   #BBBBBB;
      --gc-gray-100:   #F5F5F5;
      --gc-gray-50:    #FAFAFA;
      --font-display:  'Nunito', sans-serif;
      --font-body:     'Inter', sans-serif;
      --radius:        8px;
    }

    body {
      font-family: var(--font-body);
      background: var(--gc-gray-50);
      color: var(--gc-gray-900);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    .gc-header {
      background: var(--gc-white);
      border-bottom: 1px solid var(--gc-gray-100);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .gc-header img { height: 28px; }
    .gc-header-divider {
      width: 1px;
      height: 20px;
      background: var(--gc-gray-300);
    }
    .gc-header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gc-gray-700);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .gc-header-badge {
      margin-left: auto;
      background: var(--gc-green-pale);
      color: var(--gc-green-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── CONTAINER ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .container--wide {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── CARD ── */
    .card {
      background: var(--gc-white);
      border: 1px solid var(--gc-gray-100);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--gc-black);
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: 13px;
      color: var(--gc-gray-500);
      margin-bottom: 24px;
    }

    /* ── RATING STARS ── */
    .rating-group { margin-bottom: 28px; }
    .rating-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--gc-gray-900);
      margin-bottom: 10px;
      display: block;
    }
    .rating-desc {
      font-size: 12px;
      color: var(--gc-gray-500);
      margin-bottom: 10px;
      display: block;
      margin-top: -6px;
    }
    .stars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stars input[type="radio"] { display: none; }
    .stars label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      width: 52px;
    }
    .stars label .star-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--gc-gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--gc-gray-500);
      transition: all 0.15s ease;
    }
    .stars label .star-text {
      font-size: 10px;
      color: var(--gc-gray-500);
      text-align: center;
      font-weight: 500;
    }
    .stars input[type="radio"]:checked + label .star-circle,
    .stars label:hover .star-circle {
      background: var(--gc-green);
      border-color: var(--gc-green);
      color: var(--gc-white);
      transform: scale(1.08);
    }
    .stars input[type="radio"]:checked + label .star-text {
      color: var(--gc-green-dark);
      font-weight: 600;
    }

    /* ── TEXTAREA ── */
    .field { margin-bottom: 24px; }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--gc-gray-900);
      margin-bottom: 8px;
    }
    .field label span {
      font-weight: 400;
      color: var(--gc-gray-500);
    }
    .field textarea, .field select {
      width: 100%;
      background: var(--gc-gray-50);
      border: 1px solid var(--gc-gray-300);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--gc-gray-900);
      resize: vertical;
      transition: border-color 0.15s;
      outline: none;
    }
    .field textarea:focus, .field select:focus {
      border-color: var(--gc-green);
      background: var(--gc-white);
    }
    .field textarea { min-height: 96px; }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 20px;
    }
    .section-divider-line {
      flex: 1;
      height: 1px;
      background: var(--gc-gray-100);
    }
    .section-divider-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gc-gray-500);
    }

    /* ── BUTTON ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--gc-green);
      color: var(--gc-white);
      width: 100%;
    }
    .btn-primary:hover { background: var(--gc-green-dark); }
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--gc-green);
      color: var(--gc-green);
    }
    .btn-secondary:hover { background: var(--gc-green-pale); }
    .btn-dark {
      background: var(--gc-black);
      color: var(--gc-white);
    }
    .btn-dark:hover { background: #333; }

    /* ── NOTICE BOX ── */
    .notice {
      background: var(--gc-green-pale);
      border-left: 3px solid var(--gc-green);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--gc-gray-700);
      margin-bottom: 28px;
    }
    .notice strong { color: var(--gc-green-dark); }

    /* ── PAGE HEADING ── */
    .page-heading { margin-bottom: 28px; }
    .page-heading .eyebrow {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gc-green);
      margin-bottom: 8px;
    }
    .page-heading h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--gc-black);
      line-height: 1.2;
    }
    .page-heading p {
      font-size: 14px;
      color: var(--gc-gray-500);
      margin-top: 6px;
    }

    /* ── FOOTER ── */
    .gc-footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--gc-gray-300);
      border-top: 1px solid var(--gc-gray-100);
      background: var(--gc-white);
    }

    @media (max-width: 480px) {
      .container { padding: 24px 16px 60px; }
      .card { padding: 20px; }
      .page-heading h1 { font-size: 22px; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<header class="gc-header">
  <img src="https://images.seeklogo.com/logo-png/51/2/gran-coffee-logo-png_seeklogo-517057.png" alt="Gran Coffee" onerror="this.style.display='none'">
  <div class="gc-header-divider"></div>
  <span class="gc-header-title">Equipe de Sistemas</span>
  <span class="gc-header-badge">{% block badge %}Feedback{% endblock %}</span>
</header>

{% block content %}{% endblock %}

<footer class="gc-footer">
  © 2026 Gran Coffee · Equipe de Sistemas · Respostas anônimas e confidenciais
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
